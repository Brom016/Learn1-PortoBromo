<style>
/* 1. DEFINISI VARIABEL WARNA (Ini yang kamu lupakan) */
:root {
  --color-background-primary: #ffffff;
  --color-background-secondary: #f8fafc;
  --color-background-tertiary: #e2e8f0;
  --color-border-secondary: #cbd5e1;
  --color-text-primary: #0f172a;
  --color-text-secondary: #475569;
  --b: #94a3b8; /* Warna garis putus-putus (Lifeline) */
}

/* 2. BASE CONTAINER */
.seq-wrap { 
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--color-background-primary);
  border: 1px solid var(--color-border-secondary);
  border-radius: 12px;
  padding: 24px;
  max-width: 720px;
  margin: 0 auto;
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
}

/* 3. NAVIGATION */
.seq-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.seq-dots { display: flex; gap: 8px; }
.seq-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--color-border-secondary); transition: background .2s; }
.seq-dot.active { background: #2563eb; }
.seq-title { font-size: 14px; font-weight: 600; color: var(--color-text-primary); text-align: center; flex:1; }

.seq-btn { 
  background: var(--color-background-primary); 
  border: 1px solid var(--color-border-secondary); 
  border-radius: 8px; 
  padding: 8px 16px; 
  font-size: 13px; 
  font-weight: 500;
  cursor: pointer; 
  color: var(--color-text-primary); 
  transition: all .2s; 
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
}
.seq-btn:hover:not(:disabled) { background: var(--color-background-secondary); border-color: #94a3b8; }
.seq-btn:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }

.seq-panel { display: none; animation: fadeIn 0.3s ease-in-out; }
.seq-panel.visible { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

/* 4. SVG STYLING (Yang sebelumnya gaib) */
svg { width: 100%; display: block; overflow: visible; }
.th { font-size: 14px; font-weight: 600; fill: #ffffff; } /* Teks Header Kotak */
.ts { font-size: 12px; font-weight: 500; } /* Teks Step */

/* Warna Kotak Aktor (Actors) */
.c-blue rect { fill: #2563eb; stroke: #1e40af; }
.c-purple rect { fill: #9333ea; stroke: #6b21a8; }
.c-teal rect { fill: #0d9488; stroke: #0f766e; }
.c-coral rect { fill: #ea580c; stroke: #c2410c; }
</style>

<script>
const panels = document.querySelectorAll('.seq-panel');
const dotsEl = document.getElementById('dots');
const titleEl = document.getElementById('slide-title');
let cur = 0;

panels.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'seq-dot' + (i === 0 ? ' active' : '');
  dotsEl.appendChild(d);
});

function render() {
  panels.forEach((p, i) => {
    p.classList.toggle('visible', i === cur);
  });
  document.querySelectorAll('.seq-dot').forEach((d, i) => {
    d.classList.toggle('active', i === cur);
  });
  titleEl.textContent = panels[cur].dataset.title;
  document.getElementById('btn-prev').disabled = cur === 0;
  document.getElementById('btn-next').disabled = cur === panels.length - 1;
}

function go(dir) {
  cur = Math.max(0, Math.min(panels.length - 1, cur + dir));
  render();
}

render();
</script>
